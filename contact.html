  <main class="sub-page">
    <section id="contact" class="container reveal">
      <div class="contact-grid">
        <div class="contact-info glass glass-card">
          <h2 class="text-gradient section-hero-title">Get in Touch</h2>
          <p class="section-tagline">Have a project in mind or just want to say hi? I'm always open to discussing new opportunities and creative ideas.</p>
          
          <div class="contact-details">
            <div class="contact-item">
              <i class="fas fa-envelope"></i>
              <div>
                <h4>Email</h4>
                <a href="mailto:kutijoshua76@gmail.com">kutijoshua76@gmail.com</a>
              </div>
            </div>
            <div class="contact-item">
              <i class="fas fa-phone"></i>
              <div>
                <h4>Call Me</h4>
                <a href="tel:09048667567">09048667567</a>
              </div>
            </div>
          </div>

          <div class="social-links">
            <a href="https://wa.me/message/GCAQ5Q5MFRXKP1" target="_blank" rel="noopener" class="social-icon" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.linkedin.com/in/kuti-joshua-53532836b" target="_blank" rel="noopener" class="social-icon" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>

        <div class="contact-form-container glass glass-card">
          <form action="https://formspree.io/f/kutijoshua76@gmail.com" method="POST" class="contact-form">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
              <label for="message">Your Message</label>
              <textarea id="message" name="message" rows="5" placeholder="How can I help you?" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Send Message</button>
          </form>
        </div>
      </div>
